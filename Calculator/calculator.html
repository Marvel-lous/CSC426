<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CSC 426 Calculator</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:#f4f4f4;
}

.calculator{
    width:350px;
    background:#fff;
    padding:20px;
    border-radius:15px;
    box-shadow:0 4px 15px rgba(0,0,0,0.2);
}

.calculator h2{
    text-align:center;
    margin-bottom:15px;
    color:#333;
}

#display{
    width:100%;
    height:60px;
    border:2px solid #ddd;
    border-radius:10px;
    text-align:right;
    padding:10px;
    font-size:24px;
    margin-bottom:15px;
    outline:none;
}

.buttons{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:10px;
}

button{
    height:60px;
    border:none;
    border-radius:10px;
    font-size:22px;
    cursor:pointer;
    background:#e5e5e5;
    transition:0.3s;
}

button:hover{
    background:#d0d0d0;
}

.operator{
    background:#ff9500;
    color:white;
}

.operator:hover{
    background:#e68600;
}

.clear{
    background:#dc3545;
    color:white;
}

.clear:hover{
    background:#c82333;
}

.equal{
    background:#28a745;
    color:white;
    grid-column:span 2;
}

.equal:hover{
    background:#218838;
}

.footer{
    text-align:center;
    margin-top:15px;
    font-size:12px;
    color:#666;
}
</style>
</head>

<body>

<div class="calculator">
    
    <h2>Calculator</h2>

    <input type="text" id="display" readonly>

    <div class="buttons">

        <button class="clear" onclick="clearDisplay()">C</button>
        <button class="operator" onclick="appendValue('%')">%</button>
        <button class="operator" onclick="appendValue('^')">^</button>
        <button class="operator" onclick="appendValue('/')">/</button>

        <button onclick="appendValue('7')">7</button>
        <button onclick="appendValue('8')">8</button>
        <button onclick="appendValue('9')">9</button>
        <button class="operator" onclick="appendValue('*')">*</button>

        <button onclick="appendValue('4')">4</button>
        <button onclick="appendValue('5')">5</button>
        <button onclick="appendValue('6')">6</button>
        <button class="operator" onclick="appendValue('-')">-</button>

        <button onclick="appendValue('1')">1</button>
        <button onclick="appendValue('2')">2</button>
        <button onclick="appendValue('3')">3</button>
        <button class="operator" onclick="appendValue('+')">+</button>

        <button onclick="appendValue('0')">0</button>
        <button onclick="appendValue('.')">.</button>
        <button class="equal" onclick="calculate()">=</button>

    </div>

    <div class="footer">
        HTML • CSS • JavaScript | CSC 426 Assignment
    </div>
</div>

<script>
const display = document.getElementById("display");

function appendValue(value){
    display.value += value;
}

function clearDisplay(){
    display.value = "";
}

function calculate(){
    try{
        let expression = display.value;

        // Convert ^ to JavaScript exponentiation
        expression = expression.replace(/\^/g, "**");

        let result = eval(expression);

        display.value = result;
    }
    catch(error){
        display.value = "Error";
    }
}

// Keyboard Support
document.addEventListener("keydown", function(event){

    const key = event.key;

    if(!isNaN(key) || ['+','-','*','/','%','.'].includes(key)){
        appendValue(key);
    }

    if(key === '^'){
        appendValue('^');
    }

    if(key === 'Enter'){
        calculate();
    }

    if(key === 'Backspace'){
        display.value = display.value.slice(0,-1);
    }

    if(key === 'Escape'){
        clearDisplay();
    }
});
</script>

</body>
</html>
